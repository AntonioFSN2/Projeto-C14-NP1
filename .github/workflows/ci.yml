name: CI - JUnit

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  junit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Executar testes JUnit
        run: mvn test

      - name: Salvar relatórios JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-junit
          path: target/surefire-reports