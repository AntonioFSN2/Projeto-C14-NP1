name: Build Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Compile project
      run: mvn clean compile -DskipTests

    - name: Package project
      run: mvn package -DskipTests

    - name: Get project version
      id: get-version
      run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

    - name: Rename JAR file
      run: mv target/$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)-${{ steps.get-version.outputs.version }}.jar target/sistema-bancario-${{ steps.get-version.outputs.version }}.jar

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: sistema-bancario-jar
        path: target/sistema-bancario-*.jar