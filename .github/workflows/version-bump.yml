name: Version Bump

on:
  workflow_run:
    workflows: [ "Tests" ]
    branches: [ main ]
    types: [ completed ]
    # Só dispara quando o push é direto para main (não em PRs)
    # O filtro de branch acima já garante isso

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ler versão atual e calcular próxima
        id: version
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Atualizar versão no pom.xml
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.new }} -DgenerateBackupPoms=false

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit e tag
        run: |
          git add pom.xml
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git tag "v${{ steps.version.outputs.new }}"
          git pull --rebase origin main
          git push origin main
          git push origin "v${{ steps.version.outputs.new }}"
